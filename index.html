<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Produksi - Menu Utama</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #e0eef5 0%, #c9dde8 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            color: #1e3b4a;
            margin-bottom: 12px;
        }
        .sub {
            color: #5f7f8c;
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }
        .menu-card {
            background: #f8fafc;
            border-radius: 28px;
            padding: 28px 16px;
            text-decoration: none;
            color: #1e3b4a;
            transition: all 0.2s ease;
            border: 1px solid #e2edf2;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            cursor: pointer;
            display: block;
        }
        .menu-card:hover {
            transform: translateY(-6px);
            background: white;
            border-color: #2c7da0;
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }
        .menu-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .menu-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .menu-desc {
            font-size: 0.85rem;
            color: #5f7f8c;
        }
        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #8aa6b5;
        }
        @media (max-width: 550px) {
            .container { padding: 24px 20px; }
            h1 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏭 Sistem Manajemen Produksi</h1>
    <div class="sub">Pilih menu yang tersedia</div>
    <div class="menu-grid">
        <!-- Tombol Input Produksi -->
        <a href="input_produksi.html" class="menu-card">
            <div class="menu-icon">📝</div>
            <div class="menu-title">Input Produksi</div>
            <div class="menu-desc">Tambah data produksi harian</div>
        </a>
        
        <!-- Tombol Filter Laporan -->
        <a href="laporan_produksi.html" class="menu-card">
            <div class="menu-icon">📊</div>
            <div class="menu-title">Filter Laporan</div>
            <div class="menu-desc">Lihat laporan dengan filter</div>
        </a>
        
        <!-- Tombol Kelola Master (perlu login) -->
        <a href="login.html?redirect=crud_master.html" class="menu-card">
            <div class="menu-icon">⚙️</div>
            <div class="menu-title">Kelola Master</div>
            <div class="menu-desc">Tambah/edit pekerja & mesin (login)</div>
        </a>
    </div>
    <footer>Data tersimpan realtime ke Google Sheets</footer>
</div>
</body>
</html>
