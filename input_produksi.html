<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Produksi</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #e9f0f5; margin: 0; padding: 30px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 800px; width: 100%; background: white; border-radius: 32px; padding: 28px 32px; box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
        h2 { font-size: 1.8rem; font-weight: 600; color: #1e3b4a; margin-top: 0; margin-bottom: 24px; border-left: 5px solid #2c7da0; padding-left: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 28px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-weight: 600; color: #1e4663; font-size: 0.85rem; }
        .input-group input, .input-group select { padding: 12px 14px; border: 1.5px solid #cfdee9; border-radius: 20px; font-size: 0.95rem; background: white; }
        .btn { background: #2c7da0; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn-secondary { background: #5e8b7e; }
        .btn:hover { filter: brightness(0.92); transform: translateY(-1px); }
        .warning { background: #fff7e5; border-left: 5px solid #f4b942; padding: 12px 18px; border-radius: 20px; margin: 16px 0; display: none; }
        hr { margin: 20px 0; border-color: #e2edf2; }
        .footer-note { font-size: 0.8rem; color: #5f7f8c; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 Form Input Produksi Harian</h2>
    <form id="productionForm">
        <div class="form-grid">
            <div class="input-group">
                <label>🏭 Mesin</label>
                <select id="mesin" required><option value="">Memuat mesin...</option></select>
            </div>
            <div class="input-group">
                <label>👨‍🏭 Pekerja</label>
                <select id="pekerja" required><option value="">Memuat pekerja...</option></select>
            </div>
            <div class="input-group">
                <label>📄 Nama File / Proyek</label>
                <input type="text" id="namaFile" required placeholder="Contoh: order_ABC">
            </div>
            <div class="input-group">
                <label>✅ Jumlah Dikerjakan</label>
                <input type="number" id="jumlahDikerjakan" required min="0" value="0">
            </div>
            <div class="input-group">
                <label>📊 Persentase (%)</label>
                <input type="text" id="persentase" placeholder="Contoh: 100 atau 85.5" value="100" required>
            </div>
            <div class="input-group">
                <label>🧑 Nama Pemesan</label>
                <input type="text" id="namaPemesan" required>
            </div>
        </div>
        <div style="display: flex; gap: 15px; justify-content: flex-end;">
            <button type="button" class="btn" id="submitBtn">💾 Simpan Data</button>
            <button type="reset" class="btn btn-secondary" id="resetBtn">↺ Reset</button>
        </div>
    </form>
    <div id="formFeedback" class="warning"></div>
    <hr>
    <div class="footer-note">
        ⚡ Persentase diisi manual (tidak terhubung dengan Jumlah Dikerjakan)
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGoxq_XsXGifT4wWWvDbwnNmJUUbg4G9ag2rZGotjzwSpw0GjSuhr1dTcOnBUABAqM/exec";

    function showFeedback(msg, isError = true) {
        const fb = document.getElementById('formFeedback');
        fb.style.display = 'block';
        fb.innerHTML = isError ? `⚠️ ${msg}` : `✅ ${msg}`;
        fb.style.background = isError ? '#fff2e6' : '#e0f2e9';
        setTimeout(() => { fb.style.display = 'none'; }, 4000);
    }

    async function loadMasterData() {
        try {
            const [mesinRes, pekerjaRes] = await Promise.all([
                fetch(`${SCRIPT_URL}?action=getMesin`),
                fetch(`${SCRIPT_URL}?action=getPekerja`)
            ]);
            const mesinData = await mesinRes.json();
            const pekerjaData = await pekerjaRes.json();

            const mesinSelect = document.getElementById('mesin');
            const pekerjaSelect = document.getElementById('pekerja');

            if (mesinData.status === 'success' && mesinData.data.mesin.length) {
                mesinSelect.innerHTML = '<option value="">Pilih Mesin</option>';
                mesinData.data.mesin.forEach(m => {
                    mesinSelect.innerHTML += `<option value="${m}">${m}</option>`;
                });
            } else {
                mesinSelect.innerHTML = '<option value="">Tidak ada data mesin</option>';
            }

            if (pekerjaData.status === 'success' && pekerjaData.data.pekerja.length) {
                pekerjaSelect.innerHTML = '<option value="">Pilih Pekerja</option>';
                pekerjaData.data.pekerja.forEach(p => {
                    pekerjaSelect.innerHTML += `<option value="${p}">${p}</option>`;
                });
            } else {
                pekerjaSelect.innerHTML = '<option value="">Tidak ada data pekerja</option>';
            }
        } catch (err) {
            console.error(err);
            showFeedback("Gagal terhubung ke server. Periksa URL Apps Script.", true);
        }
    }

    async function simpanData() {
        const mesin = document.getElementById('mesin').value;
        const pekerja = document.getElementById('pekerja').value;
        const namaFile = document.getElementById('namaFile').value;
        const jumlahDikerjakan = document.getElementById('jumlahDikerjakan').value;
        const persentase = document.getElementById('persentase').value;
        const namaPemesan = document.getElementById('namaPemesan').value;

        if (!mesin || !pekerja || !namaFile || !jumlahDikerjakan || !persentase || !namaPemesan) {
            showFeedback("Harap isi semua field wajib", true);
            return;
        }

        if (isNaN(parseFloat(persentase))) {
            showFeedback("Persentase harus berupa angka", true);
            return;
        }

        const url = `${SCRIPT_URL}?action=simpanProduksi&mesin=${encodeURIComponent(mesin)}&pekerja=${encodeURIComponent(pekerja)}&namaFile=${encodeURIComponent(namaFile)}&jumlahDikerjakan=${encodeURIComponent(jumlahDikerjakan)}&persentase=${encodeURIComponent(persentase)}&namaPemesan=${encodeURIComponent(namaPemesan)}`;

        try {
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === 'success') {
                showFeedback("Data produksi berhasil disimpan!", false);
                document.getElementById('productionForm').reset();
                document.getElementById('jumlahDikerjakan').value = "0";
                document.getElementById('persentase').value = "100";
            } else {
                throw new Error(result.data || "Gagal simpan");
            }
        } catch (err) {
            showFeedback("Gagal menyimpan data: " + err.message, true);
        }
    }

    document.getElementById('submitBtn').addEventListener('click', simpanData);
    document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('productionForm').reset();
        document.getElementById('jumlahDikerjakan').value = "0";
        document.getElementById('persentase').value = "100";
    });

    window.addEventListener('DOMContentLoaded', () => {
        loadMasterData();
        document.getElementById('jumlahDikerjakan').value = "0";
        document.getElementById('persentase').value = "100";
    });
</script>
</body>
</html>
