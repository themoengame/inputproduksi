<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kelola Master</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(145deg, #e0eef5, #cde1ec);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            max-width: 400px;
            width: 90%;
            padding: 36px 28px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { color: #1e3b4a; margin-bottom: 8px; }
        .info { color: #5f7f8c; font-size: 0.85rem; margin-bottom: 28px; }
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }
        label { font-weight: 600; color: #1e4663; display: block; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #cfdee9;
            border-radius: 28px;
            font-size: 1rem;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
        }
        .error {
            background: #fff2e6;
            border-left: 4px solid #c44536;
            padding: 10px;
            border-radius: 16px;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #b33;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #2c7da0;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>🔐 Login Required</h2>
    <div class="info">Masukkan nama pengguna yang terdaftar di database</div>
    <div class="input-group">
        <label>👤 Nama Pengguna</label>
        <input type="text" id="username" placeholder="Contoh: admin" autocomplete="off">
    </div>
    <button id="loginBtn">Masuk ke CRUD Master</button>
    <div id="msgArea" class="error" style="display: none;"></div>
    <a href="index.html" class="back-link">← Kembali ke Menu Utama</a>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGoxq_XsXGifT4wWWvDbwnNmJUUbg4G9ag2rZGotjzwSpw0GjSuhr1dTcOnBUABAqM/exec";

    async function cekUsername(username) {
        const url = `${SCRIPT_URL}?action=checkUser&username=${encodeURIComponent(username)}`;
        try {
            const response = await fetch(url);
            const result = await response.json();
            return result.status === 'success' && result.data.valid === true;
        } catch (err) {
            console.error(err);
            return false;
        }
    }

    document.getElementById('loginBtn').onclick = async () => {
        const username = document.getElementById('username').value.trim();
        const msgDiv = document.getElementById('msgArea');
        if (!username) {
            msgDiv.style.display = 'block';
            msgDiv.innerText = '❌ Harap masukkan nama pengguna';
            return;
        }
        msgDiv.style.display = 'none';
        
        const valid = await cekUsername(username);
        if (valid) {
            sessionStorage.setItem('crud_authenticated', 'true');
            sessionStorage.setItem('crud_user', username);
            const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || 'crud_master.html';
            window.location.href = redirectUrl;
        } else {
            msgDiv.style.display = 'block';
            msgDiv.innerText = '❌ Nama pengguna tidak terdaftar. Hubungi admin.';
        }
    };
</script>
</body>
</html>
